<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>SafarX</title>
<link rel="stylesheet" href="/static/style.css" />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div id="app">

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">SX</span>
      <span class="brand-name">SafarX</span>
    </div>
    <button class="refresh-btn" id="refreshBtn" aria-label="Yangilash">⟳</button>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-tab="all" role="tab">Barcha e'lonlar</button>
    <button class="tab" data-tab="mine" role="tab">Mening e'lonlarim</button>
  </nav>

  <div class="filters">
    <button class="filter-pill" id="filterFrom">
      <span class="filter-label">Qayerdan</span>
      <span class="filter-value" id="fromValue">Barchasi</span>
    </button>
    <button class="filter-pill" id="filterTo">
      <span class="filter-label">Qayerga</span>
      <span class="filter-value" id="toValue">Barchasi</span>
    </button>
    <button class="filter-reset" id="filterReset" hidden aria-label="Filtrni tozalash">✕</button>
  </div>

  <main class="list" id="list" aria-live="polite"></main>

  <p class="hint" id="hint">Joy band qilish uchun e'londagi tugmani bosing — bot suhbatida davom etadi.</p>

  <nav class="bottom-nav">
    <button class="nav-item active" data-nav="home">
      <span class="nav-icon">🏠</span><span>Bosh sahifa</span>
    </button>
    <button class="nav-item" data-nav="listings">
      <span class="nav-icon">📋</span><span>E'lonlar</span>
    </button>
    <button class="nav-item nav-item--cta" data-nav="post" aria-label="E'lon berish">
      <span class="nav-icon">＋</span>
    </button>
    <button class="nav-item" data-nav="messages">
      <span class="nav-icon">💬</span><span>Xabarlar</span>
    </button>
    <button class="nav-item" data-nav="profile">
      <span class="nav-icon">👤</span><span>Profil</span>
    </button>
  </nav>

</div>

<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="sheet" id="citySheet" role="dialog" aria-modal="true">
  <div class="sheet-handle"></div>
  <h3 class="sheet-title" id="sheetTitle">Shaharni tanlang</h3>
  <div class="sheet-options" id="sheetOptions"></div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
